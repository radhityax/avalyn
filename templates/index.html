<title>{{.Site_Title}}</title>
<body>
	<main>
	<ul class="list-posts">
        {{range .Posts}}
        <li>
			<p>{{.Date}} | <a href="/{{.Author}}">{{.Author}}</a> | <a href="/{{.Author}}/blog/{{.Slug}}">{{.Title}}</a></p>
        </li>
        {{else}}
        <li>No posts yet</li>
        {{end}}
    </ul>

        {{if gt .Page 1}}
            <a href="/?page={{sub .Page 1}}">Prev</a>
        {{end}}

        <span>{{.Page}}</span>

        {{if eq (len .Posts) .Limit}}
            <a href="/?page={{add .Page 1}}">Next</a>
        {{end}}
	</main>
</body>
