<title>create post</title>
<head>
	<style>
		.form-group { margin-bottom: 1em; }
		label {
			display: block;
			margin-bottom: 0.3em;
			font-weight: bold;
		}
		input[type="text"],
		input[type="password"],
		input[type="date"],
		textarea,
		select {
			width: 100%;
			max-width: 500px;
			padding: 0.5em;
			border: 1px solid #ccc;
			border-radius: 4px;
			font-size: 1em;
			box-sizing: border-box;
		}
		textarea {
			min-height: 200px;
			resize: vertical;
			font-family: monospace;
		}
		.form-inline {
			display: flex;
			align-items: center;
			gap: 0.5em;
		}
		.password-toggle {
			display: flex;
			align-items: center;
			gap: 0.5em;
		}
		@media (max-width: 600px) {
			input[type="text"],
			input[type="password"],
			input[type="date"],
			textarea,
			select {
				max-width: 100%;
			}
			textarea {
				min-height: 150px;
			}
		}
	</style>
</head>
<body>
	<main>
	<h1>create</h1>
	<form method="POST" action="/new" autocomplete="off">
		<div class="form-group">
			<label for="page_title">Title:</label>
			<input id="page_title" type="text" name="page_title" required>
		</div>

		<div class="form-group">
			<label for="date">Date:</label>
			<input id="date" name="date" type="date">
		</div>

		<div class="form-group">
			<label>Content <a href="https://www.markdownguide.org/basic-syntax/" rel="nofollow" target="_blank">Markdown</a>:</label>
			<textarea name="content" required></textarea>
		</div>

		<div class="form-group">
			<label for="thumbnail">Thumbnail URL:</label>
			<input type="text" id="thumbnail" name="thumbnail" placeholder="https://example.com/image.jpg">
		</div>

		<div class="form-group">
			<label for="youtube">YouTube ID:</label>
			<input type="text" id="youtube" name="youtube" placeholder="dQw4w9WgXcQ">
		</div>

		<div class="form-group">
			<label for="type">Type:</label>
			<select name="type" id="type">
				<option value="blog">blog</option>
				<option value="misc">misc</option>
			</select>
		</div>

		<div class="form-group">
			<label>Status:</label>
			<div class="form-inline">
				<input type="radio" id="post" name="status" value="post" checked>
				<label for="post" style="font-weight: normal;">Post</label>
			</div>
			<div class="form-inline">
				<input type="radio" id="draft" name="status" value="draft">
				<label for="draft" style="font-weight: normal;">Draft</label>
			</div>
		</div>

		<div class="form-group">
			<div class="password-toggle">
				<input type="checkbox" id="xopt">
				<label for="xopt" style="font-weight: normal;">Password protect</label>
			</div>
			<input id="page_password" name="page_password" type="password" placeholder="optional password" style="display: none; margin-top: 0.5em; max-width: 500px; width: 100%;">
		</div>

		<button type="submit">Create</button>
	</form>
	<p><a href="/dashboard">Back to dashboard</a></p>
	</main>

	<script>
		const xopt = document.getElementById('xopt');
		const passfield = document.getElementById('page_password');
		xopt.addEventListener('change', () => {
			passfield.style.display = xopt.checked ? 'block' : 'none';
		});
	</script>
</body>
