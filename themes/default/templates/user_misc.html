<title>{{.Site_Title}} - {{.Username}}</title>
<body>
	<main>
	<h2><a href="/{{.Username}}">{{.Username}}</a> - misc</h2>
	<ul class="list-posts">
        {{range .Posts}}
        <li>
			<p><a href="/{{.Author}}/misc/{{.Slug}}">{{.Title}}</a></p>
        </li>
        {{else}}
        <li>No pages yet</li>
        {{end}}
    </ul>

        {{if gt .Page 1}}
            <a href="/{{.Username}}/misc?page={{sub .Page 1}}">Prev</a>
        {{end}}

        <span>{{.Page}}</span>

        {{if eq (len .Posts) .Limit}}
            <a href="/{{.Username}}/misc?page={{add .Page 1}}">Next</a>
        {{end}}
	</main>
</body>
